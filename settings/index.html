<!doctype html>
<html lang="en">

<head>
	<title>Settings</title>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<!-- The '/homey.js' script must be included in your settings view to work -->
	<script type="text/javascript" src="/homey.js" data-origin="settings"></script>
	<link rel="stylesheet" type="text/css" href="extraStyles.css">
	<link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>

<body>
	<div class="fixedTop">
		<label class="homey-form-label no-margin-top" for="configType" title="View selection"><span
				data-i18n="settings.view"></span></label>
		<select class="homey-form-select" id="configType" title="Select the view to display">
			<option value="settings" data-i18n="settings.Settings"></option>
			<option value="panelConfig" data-i18n="settings.buttonConfigs"></option>
			<option value="displayConfig" data-i18n="settings.displayConfigs"></option>
			<option value="brokerConfig" data-i18n="settings.brokerConfigs"></option>
			<option value="diagnosticLog" data-i18n="settings.diagnosticsLog"></option>
			<option value="lastSentLog" data-i18n="settings.sentLog"></option>
			<option value="importExport" data-i18n="settings.importExport"></option>
		</select>
		<hr class="hr-separator" />
	</div>

	<div class="main">
		<!-- Settings page -->

		<div id="settings" class="tabcontent">
			<fieldset class="homey-form-fieldset">
				<label class="homey-form-checkbox">
					<input class="homey-form-checkbox-input" id="autoConfig" type="checkbox" value="auto"
						title="Enable automatic configuration" />
					<span class="homey-form-checkbox-checkmark"></span>
					<span class="homey-form-checkbox-text"><span data-i18n="settings.autoConfig"></span></span>
				</label>
				<div id="AutoConfigWarnOff"><span data-i18n="settings.autoConfigWarning1"></span></div>
				<div id="AutoConfigWarnOn"><span data-i18n="settings.autoConfigWarning2"></span></div>
			</fieldset>
			<fieldset class="homey-form-fieldset">
				<legend class="homey-form-legend"><span data-i18n="settings.webview"></span></legend>
				<p></p>
				<label class="homey-form-label no-margin-top" for="webviewip" title="Webview IP address"><span
						data-i18n="settings.webviewip"></span>
					<div class="tooltip"><i class="fi fi-rr-info"></i>
						<span class="tooltiptext" data-i18n="settings.webviewExplanation"></span>
					</div>
				</label>
				<select class="homey-form-select" id="webviewip" title="Select webview IP address">
				</select>
				<p></p>
				<p><button class="homey-button-secondary-shadow" id="openwebview" title="Open webview"><span
							data-i18n="settings.openwebview"></span></button></p>
			</fieldset>
		</div>

		<!-- Diagnostics Log -->
		<div id="diagnosticLog" class="tabcontent">
			<fieldset class="homey-form-fieldset">
				<label class="homey-form-checkbox">
					<input class="homey-form-checkbox-input" id="enableLog" type="checkbox" value="auto"
						title="Enable diagnostic logging" />
					<span class="homey-form-checkbox-checkmark"></span>
					<span class="homey-form-checkbox-text"><span data-i18n="settings.enableLog"></span></span>
					<div class="tooltip"><i class="fi fi-rr-info"></i>
						<span class="tooltiptext" data-i18n="settings.enableLLogExplanation"></span>
					</div>
				</label>
				<div class="field row">
					<label class="homey-form-label" for="email"><span data-i18n="settings.email"></span>
						<div class="tooltip"><i class="fi fi-rr-info"></i>
							<span class="tooltiptext" data-i18n="settings.emailExplanation"></span>
						</div>
					</label>
					<input class="homey-form-input" id="email" type="text" placeholder="Email address"
						title="Enter email address for support" />
					<label class="homey-form-label" for="description"><span data-i18n="settings.description"></span>
						<div class="tooltip"><i class="fi fi-rr-info"></i>
							<span class="tooltiptext" data-i18n="settings.descriptionExplanation"></span>
						</div>
					</label>
					<input class="homey-form-input" id="description" type="text" placeholder="Problem description"
						title="Enter problem description" />
					<p></p>
				</div>
				<p><button class="homey-button-secondary-shadow" id="clearLog" title="Clear log"><span
							data-i18n="settings.clearLog"></span></button>
					<button class="homey-button-secondary-shadow" id="sendLog" title="Send log"><span
							data-i18n="settings.sendLog"></span></button>
					<button class="homey-button-secondary-shadow" id="getListeners" title="Get listeners"><span
							data-i18n="settings.getListeners"></span></button>
				</p>
				<div class="field row">
					<textarea id="diagLog" class="homey-form-textarea" placeholder="Diagnostic log output"
						title="Diagnostic log information"></textarea>
				</div>
			</fieldset>
		</div>

		<!-- Last sent Log -->
		<div id="lastSentLog" class="tabcontent">
			<fieldset class="homey-form-fieldset">
				<div class="field row">
					<label class="homey-form-label no-margin-top" for="sentip" title="Sent IP address"><span
							data-i18n="settings.webviewip"></span>
					</label>
					<select class="homey-form-select" id="sentip" title="Select sent IP address">
					</select>
				</div>
				<p></p>
				<div class="field row">
					<button class="homey-button-secondary-shadow" id="getLog" title="Get log"><span
							data-i18n="settings.getLog"></span></button>
				</div>
				<p></p>
				<div class="field row">
					<textarea id="sentLog" class="homey-form-textarea" placeholder="Last sent log"
						title="Last sent log data"></textarea>
				</div>
			</fieldset>
		</div>

		<!-- Button Bar Configuration -->

		<div id="panelConfig" class="tabcontent">
			<div class="homey-form-group">
				<div class="bordered-box">
					<label class="homey-form-label" for="ButtonPanelConfigurationNo"
						title="Button panel configuration"><span data-i18n="settings.configtoedit"></span>
						<div class="tooltip"><i class="fi fi-rr-info"></i>
							<span class="tooltiptext" data-i18n="settings.buttonExplanation"></span>
						</div>
					</label>
					<div class="panel-config-selector-row">
						<select class="homey-form-select" id="ButtonPanelConfigurationNo"
							title="Select button panel configuration">
						</select>
						<button class="homey-button-secondary-shadow panel-config-toggle-btn" id="toggleConfigNameVisibility" type="button" title="Hide configuration name" aria-label="Hide configuration name"><span class="icon" style='font-size:22px;'>&#8628;</span></button>
					</div>

					<div id="configNameRow">
						<label class="homey-form-label" for="configName" title="Configuration name"><span
								data-i18n="settings.configName"></span>
							<div class="tooltip"><i class="fi fi-rr-info"></i>
								<span class="tooltiptext" data-i18n="settings.configNameExplanation"></span>
							</div>
						</label>
						<input class="homey-form-input" id="configName" type="text" maxlength="20" placeholder="Config name"
							title="Enter configuration name" />
					</div>

					<div id="buttonItemsSection"></div>
					<p>
						<button class="homey-button-secondary-shadow" id="copyButtonConfig"
							title="Copy button configuration"><span data-i18n="settings.copy"></span></button>
						<button class="homey-button-secondary-shadow" id="pasteButtonConfig"
							title="Paste button configuration"><span data-i18n="settings.paste"></span></button>
					</p>
				</div>
			</div>
		</div>

		<!-- Display Configuration -->

		<div id="displayConfig" class="tabcontent">
			<div class="homey-form-group">
				<div class="bordered-box">
					<div class="bordered-box">
						<div class="display-page-header">
							<label class="homey-form-label" for="displayConfigurationNo" title="Display configuration"><span
									data-i18n="settings.configtoedit"></span>
								<div class="tooltip"><i class="fi fi-rr-info"></i>
									<span class="tooltiptext" data-i18n="settings.displayExplanation"></span>
								</div>
							</label>
							<button class="homey-button-secondary-shadow button-page-sim-btn" id="displayPageSimOpen" title="Open display simulator"><i class="fi fi-rr-apps"></i></button>
						</div>
						<select class="homey-form-select" id="displayConfigurationNo"
							title="Select display configuration">
						</select>

						<label class="homey-form-label" for="displayConfigName" title="Display configuration name"><span
								data-i18n="settings.configName"></span>
							<div class="tooltip"><i class="fi fi-rr-info"></i>
								<span class="tooltiptext" data-i18n="settings.configNameExplanation"></span>
							</div>
						</label>
						<input class="homey-form-input" id="displayConfigName" type="text" maxlength="20"
							placeholder="Config name" title="Enter display configuration name" />
					</div>
					<div id="displayItemsSection"></div>
					<p><button class="homey-button-secondary-shadow" id="newDisplayItem" title="New display item"><span
								data-i18n="settings.newDisplayItem"></span></button></p>
					<p>
						<button class="homey-button-secondary-shadow" id="copyDisplayConfig"
							title="Copy display configuration"><span data-i18n="settings.copy"></span></button>
						<button class="homey-button-secondary-shadow" id="pasteDisplayConfig"
							title="Paste display configuration"><span data-i18n="settings.paste"></span></button>
					</p>
				</div>
			</div>
		</div>

		<!-- Broker Configuration -->

		<div id="brokerConfig" class="tabcontent">
			<div class="homey-form-group">
				<div class="bordered-box">
					<div class="bordered-box">
						<label class="homey-form-label" for="defaultBroker" title="Default broker"><span
								data-i18n="settings.defaultBroker"></span>
							<div class="tooltip"><i class="fi fi-rr-info"></i>
								<span class="tooltiptext" data-i18n="settings.brokerExplanation"></span>
							</div>
						</label>
						<select class="homey-form-select" id="defaultBroker" title="Select default broker">
						</select>
					</div>
					<div id="brokerItemsSection"></div>
					<p><button class="homey-button-secondary-shadow" id="newBrokerItem" title="New broker item"><span
								data-i18n="settings.newBrokerItem"></span></button></p>
				</div>
			</div>
		</div>
	</div>

	<!-- Import / Export page -->

	<div id="importExport" class="tabcontent">
		<div class="homey-form-group">
			<div class="bordered-box">
				<div class="field row">
					<label class="homey-form-label" for="copyText" title="Import/Export data"><span
							data-i18n="settings.importExport"></span>
						<div class="tooltip"><i class="fi fi-rr-info"></i>
							<span class="tooltiptext" data-i18n="settings.importExportExplanation"></span>
						</div>
					</label>
					<textarea id="copyText" class="homey-form-textarea" placeholder="Configuration data"
						title="Paste or view configuration data"></textarea>
					<p></p>
				</div>
				<div class="field row">
					<button class="homey-button-secondary-shadow" id="import" title="Import configuration"><span
							data-i18n="settings.import"></span></button>
					<button class="homey-button-secondary-shadow" id="export" title="Export configuration"><span
							data-i18n="settings.export"></span></button>
				</div>
			</div>
		</div>
	</div>

	<!-- Save Configuration button -->

	<div id="saveBlock" class="bottomFixButtonComponent">
		<button class="homey-button-primary-full" id="save" title="Save all settings"><span
				data-i18n="settings.save"></span></button>
	</div>

	<div id="buttonPagePopupOverlay" class="button-sim-overlay" aria-hidden="true">
		<div class="button-sim-dialog" role="dialog" aria-modal="true" aria-labelledby="buttonPagePopupTitle">
			<div class="button-sim-header">
				<div class="button-sim-title-group">
					<button class="homey-button-secondary-shadow button-sim-page-nav" id="buttonPagePopupPrev" title="Previous page" aria-label="Previous page">&lt;</button>
					<div class="button-sim-title" id="buttonPagePopupTitle">Page 1</div>
					<button class="homey-button-secondary-shadow button-sim-page-nav" id="buttonPagePopupNext" title="Next page" aria-label="Next page">&gt;</button>
				</div>
				<div class="button-sim-header-actions">
					<button class="homey-button-secondary-shadow" id="buttonPagePopupStateToggle"
						title="Toggle LED state">On</button>
					<button class="homey-button-secondary-shadow button-sim-close" id="buttonPagePopupClose"
						title="Close preview">&times;</button>
				</div>
			</div>
			<div id="buttonPagePopupContent"></div>
		</div>
	</div>

	<div id="displayPagePopupOverlay" class="display-sim-overlay" aria-hidden="true">
		<div class="display-sim-dialog" role="dialog" aria-modal="true" aria-labelledby="displayPagePopupTitle">
			<div class="display-sim-header">
				<div class="display-sim-title-group">
					<button class="homey-button-secondary-shadow display-sim-page-nav" id="displayPagePopupPrev" title="Previous display page" aria-label="Previous display page">&lt;</button>
					<div class="display-sim-title" id="displayPagePopupTitle">Page 0</div>
					<button class="homey-button-secondary-shadow display-sim-page-nav" id="displayPagePopupNext" title="Next display page" aria-label="Next display page">&gt;</button>
				</div>
				<div class="display-sim-header-middle">
					<span class="display-sim-status-position-label">Status bar</span>
					<select class="display-sim-status-position-select" id="displayPagePopupStatusBarPosition" aria-label="Status bar position">
						<option value="0">Off</option>
						<option value="1">Top</option>
						<option value="2">Bottom</option>
					</select>
				</div>
				<div class="display-sim-header-actions">
					<button class="homey-button-secondary-shadow button-sim-close" id="displayPagePopupClose" title="Close display simulator">&times;</button>
				</div>
			</div>
			<div class="display-sim-surface" id="displayPagePopupSurface"></div>
		</div>
	</div>

	<div id="buttonFieldPopupOverlay" class="button-field-popup-overlay" aria-hidden="true">
		<div class="button-field-popup-dialog" role="dialog" aria-modal="true" aria-labelledby="buttonFieldPopupTitle">
			<div class="button-field-popup-header">
				<div class="button-field-popup-title" id="buttonFieldPopupTitle">Edit button field</div>
			</div>
			<div class="button-field-popup-body" id="buttonFieldPopupBody"></div>
			<div class="button-field-popup-actions">
				<button class="homey-button-secondary-shadow" id="buttonFieldPopupCancel">Cancel</button>
				<button class="homey-button-secondary-shadow" id="buttonFieldPopupSave">Save</button>
			</div>
		</div>
	</div>

	<!-- Code to handle page life -->

	<script type="text/javascript" src="settings.js"></script>
</body>

</html>
